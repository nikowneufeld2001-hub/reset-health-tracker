<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Reset">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest?v=reading-backup-compat-v9-20260723">
  <link rel="apple-touch-icon" href="./icons/reset-logo-exact-v7-20260720.png">
  <link rel="stylesheet" href="./styles.css?v=reading-backup-compat-v9-20260723">
  <title>Reset Life Dashboard</title>
</head>
<body class="theme-auto">
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <img class="brand-logo" src="./icons/reset-logo-exact-v7-20260720.png" alt="Reset">
        <div>
          <p>Reset</p>
          <h1>Life Dashboard</h1>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-button" id="themeToggle" type="button" title="Theme" aria-label="Theme"><span class="glyph icon-moon"></span></button>
        <button class="icon-button" type="button" data-page="more" title="More" aria-label="More"><span class="glyph icon-more"></span></button>
      </div>
    </header>

    <main>
      <section id="page-dashboard" class="page is-active"><div id="dashboardView"></div></section>
      <section id="page-nutrition" class="page"><div id="nutritionView"></div></section>
      <section id="page-movement" class="page"><div id="movementView"></div></section>
      <section id="page-sleep" class="page"><div id="sleepView"></div></section>
      <section id="page-time" class="page"><div id="timeView"></div></section>
      <section id="page-reading" class="page"><div id="readingView"></div></section>
      <section id="page-more" class="page"><div id="moreView"></div></section>
      <section id="page-goals" class="page"><div id="goalsView"></div></section>
      <section id="page-import" class="page"><div id="importView"></div></section>
      <section id="page-ai" class="page"><div id="aiView"></div></section>
      <section id="page-ledger" class="page"><div id="ledgerView"></div></section>
      <section id="page-share" class="page"><div id="shareView"></div></section>
      <section id="page-data" class="page"><div id="dataView"></div></section>
    </main>
  </div>

  <nav class="bottom-tabs" aria-label="Main sections">
    <button class="tab-button is-active" type="button" data-page="dashboard" title="Dashboard"><span class="tab-icon icon-today"></span><span>Today</span></button>
    <button class="tab-button" type="button" data-page="nutrition" title="Nutrition"><span class="tab-icon icon-food"></span><span>Nutrition</span></button>
    <button class="tab-button" type="button" data-page="movement" title="Movement"><span class="tab-icon icon-move"></span><span>Move</span></button>
    <button class="tab-button" type="button" data-page="sleep" title="Sleep"><span class="tab-icon icon-sleep"></span><span>Sleep</span></button>
    <button class="tab-button" type="button" data-page="time" title="Time"><span class="tab-icon icon-time"></span><span>Time</span></button>
    <button class="tab-button" type="button" data-page="reading" title="Reading"><span class="tab-icon icon-read"></span><span>Read</span></button>
    <button class="tab-button" type="button" data-page="more" title="More"><span class="tab-icon icon-more"></span><span>More</span></button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="./app.js?v=reading-backup-compat-v9-20260723"></script>
</body>
</html>
