<html lang="en">
<head>

  <title>Reset Life Tracker</title>
  <style>
    :root {
      --ink: #111318;
      --muted: #6d7380;
      --mist: #f5f5f7;
      --leaf: #3f8f68;
      --leaf-soft: #edf6f0;
      --coral: #d96a5f;
      --gold: #c9983e;
      --blue: #2f6fed;
      --blue-soft: #edf3ff;
      --violet: #7967d8;
      --teal: #4f9aa7;
      --line: #e5e5ea;
      --white: rgba(255,255,255,.96);
      --shadow: 0 10px 28px rgba(35,39,47,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--mist);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }

    header {
      position: sticky; top: 0; z-index: 3;
      display: flex; justify-content: space-between; align-items: center; gap: 1rem;
      padding: .85rem 1rem; background: rgba(245,245,247,.84); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(229,229,234,.72);
    }
    .brand { display: flex; align-items: center; gap: .75rem; min-width: 0; }
    .brandmark {
      width: 2.65rem; height: 2.65rem; border-radius: .72rem;
      background: linear-gradient(145deg, #ffffff, #edf3ff);
      display: grid; place-items: center; box-shadow: 0 10px 24px rgba(47,111,237,.16);
      position: relative; overflow: hidden; flex: 0 0 auto;
      border: 1px solid rgba(229,229,234,.9);
    }
    .brandmark:before {
      content: ""; position: absolute; inset: .38rem; border-radius: 999px;
      background: conic-gradient(from 138deg, #23d6a4 0 48%, transparent 48% 63%, #2f6fed 63% 88%, transparent 88% 100%);
      -webkit-mask: radial-gradient(circle, transparent 54%, #000 56%);
      mask: radial-gradient(circle, transparent 54%, #000 56%);
    }
    .brandmark:after {
      content: ""; position: absolute; width: .22rem; height: .22rem; border-radius: 999px; background: #24cfa1;
      top: .6rem; right: .86rem;
      box-shadow: .36rem .28rem 0 #28cba6, .52rem .68rem 0 #2fc2ad, .48rem 1.08rem 0 #34b8ba;
    }
    .brandheart {
      width: 1.24rem; height: 1.08rem; position: relative; transform: rotate(-45deg) translate(.02rem,.04rem);

    }
    .brandheart:before, .brandheart:after { content: ""; position: absolute; width: 1.08rem; height: 1.08rem; border-radius: 999px; background: inherit; }
    .brandheart:before { top: -.54rem; left: 0; }
    .brandheart:after { left: .54rem; top: 0; }
    .brandcheck {
      position: absolute; width: 1.12rem; height: .62rem; border-left: .18rem solid white; border-bottom: .18rem solid white;
      transform: rotate(-45deg) translate(.04rem,.06rem); border-radius: .08rem; z-index: 2;
    }
    .eyebrow { margin: 0; color: var(--blue); font-size: .72rem; font-weight: 850; letter-spacing: .13em; text-transform: uppercase; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 0; font-size: 1.28rem; line-height: 1.05; }
    h2 { margin-bottom: .2rem; font-size: 1.65rem; line-height: 1.05; }
    h3 { margin-bottom: .35rem; }
    .date-pill { border-radius: 999px; background: white; padding: .45rem .8rem; text-align: right; box-shadow: 0 3px 14px rgba(0,0,0,.05); border: 1px solid var(--line); }
    .date-pill p { margin: 0; font-size: .78rem; color: var(--muted); }
    .date-pill strong { display: block; font-size: .9rem; }
    main { padding: 1.1rem 1rem; }
    .section-copy { margin: 0; color: var(--muted); font-size: .92rem; line-height: 1.42; }
    .grid { display: grid; gap: .75rem; }
    .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .two { grid-template-columns: 1fr; }
    .three { grid-template-columns: 1fr; }
    .card { background: var(--white); border: 1px solid rgba(229,229,234,.84); border-radius: .5rem; padding: 1rem; box-shadow: var(--shadow); }
    .hero-card { background: #fff; border: 1px solid var(--line); }
    .metric { min-height: 7.1rem; }
    .metric-top, .row { display: flex; align-items: center; justify-content: space-between; gap: .7rem; }
    .metric label, .stat label { color: var(--muted); font-size: .78rem; font-weight: 750; }
    .metric b { display: block; margin-top: .7rem; font-size: 1.7rem; line-height: 1; overflow-wrap: anywhere; }
    .metric small, .stat small { color: var(--muted); }
    .metric-icon {
      display: inline-grid; place-items: center; min-width: 1.8rem; height: 1.8rem; padding: 0 .3rem;
      border-radius: 999px; background: #eef6ff; color: var(--blue);
      font-size: .68rem; font-weight: 950; letter-spacing: 0;
    }
    .metric.red .metric-icon { background: #faeeec; color: #a94b43; }
    .metric.green .metric-icon { background: #edf6f0; color: #2f7250; }
    .metric.blue .metric-icon { background: var(--blue-soft); color: var(--blue); }
    .metric.violet .metric-icon { background: #f0eefb; color: var(--violet); }
    .metric.gold .metric-icon { background: #fbf3e2; color: #8a641d; }
    .metric.teal .metric-icon { background: #edf7f8; color: #357681; }
    .bar { height: .48rem; margin-top: .8rem; overflow: hidden; border-radius: 99px; background: #eef0f4; }
    .bar span { display: block; height: 100%; width: 0; border-radius: inherit; background: var(--blue); }
    .bar.coral span { background: var(--coral); }
    .bar.gold span { background: var(--gold); }
    .field { display: block; background: white; border-radius: .5rem; padding: .85rem; box-shadow: var(--shadow); border: 1px solid rgba(229,229,234,.8); }
    .field span { display: block; margin-bottom: .45rem; font-size: .9rem; font-weight: 780; }
    input, textarea, select {
      width: 100%; border: 1px solid var(--line); border-radius: .5rem; outline: none;
      background: white; color: var(--ink);
    }
    input, select { min-height: 3rem; padding: 0 .8rem; font-size: 1.03rem; font-weight: 720; }
    textarea { min-height: 8rem; padding: .8rem; resize: vertical; }
    input:focus, textarea:focus, select:focus { box-shadow: 0 0 0 4px rgba(10,132,255,.16); border-color: var(--blue); }
    .jsonbox { min-height: 25rem; background: #101815; color: #e7fff2; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .78rem; line-height: 1.55; }
    .backupbox { min-height: 10rem; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .78rem; line-height: 1.45; }
    .btn {
      min-height: 3.15rem; border: 0; border-radius: .6rem; padding: 0 1rem;
      background: var(--blue); color: white; font-weight: 850; box-shadow: var(--shadow);
    }
    .btn.dark { background: var(--ink); }
    .btn.ghost { background: transparent; color: #8a3b25; box-shadow: none; border: 1px solid #efc7b8; }
    .btn.soft { background: var(--blue-soft); color: var(--blue); box-shadow: none; }
    .status { border-radius: .6rem; padding: .85rem 1rem; font-size: .9rem; font-weight: 760; }
    .success { background: #eaf8ef; color: #1e6c3e; }
    .warn { background: #fff5d9; color: #7a4b05; }
    .ledger { display: grid; gap: .75rem; }
    .statgrid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: .5rem; margin-top: .8rem; }
    .stat { border-radius: .5rem; background: #f5f5f7; padding: .65rem; }
    .stat b { display: block; margin-top: .15rem; overflow-wrap: anywhere; }
    .pillrow { display: flex; gap: .45rem; overflow-x: auto; padding-bottom: .15rem; }
    .pill { flex: 0 0 auto; border-radius: 999px; background: var(--blue-soft); color: var(--blue); padding: .42rem .7rem; font-size: .78rem; font-weight: 850; }
    .timeline { display: grid; gap: .55rem; margin-top: .8rem; }
    .timeline-row { display: grid; grid-template-columns: 7.2rem 1fr 3.5rem; align-items: center; gap: .55rem; font-size: .85rem; color: var(--muted); }
    .nav {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 4;
      background: rgba(255,255,255,.94); backdrop-filter: blur(18px);
      border-top: 1px solid rgba(255,255,255,.9);
      padding: .5rem .45rem max(.55rem, env(safe-area-inset-bottom));
      box-shadow: 0 -12px 40px rgba(30,40,34,.1);
    }
    .nav-inner { max-width: 1040px; margin: 0 auto; display: grid; grid-template-columns: repeat(10, 1fr); gap: .25rem; }
    .nav button {
      height: 3.35rem; border: 0; border-radius: .48rem; background: transparent; color: #69736c;
      font-size: .58rem; font-weight: 850;
    }
    .nav button.active { background: #111318; color: white; }
    .share-wrap { display: flex; justify-content: center; }
    .share {
      width: min(100%, 390px); aspect-ratio: 9 / 16; border-radius: .75rem;
      background: #17201d; color: white; padding: 1.45rem; box-shadow: var(--shadow);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .share h2 { margin: .25rem 0 0; color: white; font-size: 2rem; line-height: 1.05; }
    .score { margin: 1.15rem 0; border-radius: .65rem; background: rgba(255,255,255,.1); padding: 1rem; }
    .score b { display: block; font-size: 3.35rem; line-height: 1; }
    .share-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .55rem; }
    .share-stat { border-radius: .55rem; background: rgba(255,255,255,.1); padding: .65rem; }
    .share-stat small { color: rgba(255,255,255,.64); }
    .share-stat b { display: block; margin-top: .15rem; font-size: 1rem; }
    .share-bottom { margin-top: auto; display: grid; gap: .8rem; }
    .share-bottom p { margin: .2rem 0 0; font-size: 1.12rem; font-weight: 850; }
    .footer { border-top: 1px solid rgba(255,255,255,.16); padding-top: .9rem; text-align: center; color: rgba(255,255,255,.7); font-size: .9rem; }
    .gold { color: var(--gold); }
    .ring-row { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: .75rem; margin-top: 1rem; }
    .ring-card { display: grid; grid-template-columns: 4.5rem 1fr; align-items: center; gap: .85rem; }
    .ring {
      width: 4.5rem; aspect-ratio: 1; border-radius: 999px;
      display: grid; place-items: center;
      background: conic-gradient(var(--blue) var(--progress), #e9eef5 0);
      box-shadow: inset 0 0 0 .55rem white;
      font-weight: 900;
    }
    .ring.violet { background: conic-gradient(var(--violet) var(--progress), #eeeafc 0); }
    .ring.coral { background: conic-gradient(var(--coral) var(--progress), #f8e8e1 0); }
    .skill-list { display: grid; gap: .75rem; margin-top: 1rem; }
    .skill-card { border-left: .28rem solid var(--blue); }
    .skill-card.violet { border-left-color: var(--violet); }
    .skill-card.coral { border-left-color: var(--coral); }
    .skill-meta { display: flex; gap: .45rem; flex-wrap: wrap; margin-top: .55rem; }
    .skill-meta span { border-radius: 999px; background: #f0f4fb; color: #315c9c; padding: .35rem .55rem; font-size: .76rem; font-weight: 850; }
    .snapshot { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: .65rem; margin-top: 1rem; }
    .snapshot-item { display: grid; justify-items: center; gap: .4rem; min-width: 0; }
    .snapshot-ring {
      width: 4.2rem; aspect-ratio: 1; border-radius: 999px;
      display: grid; place-items: center;
      background: conic-gradient(var(--ring-color) var(--progress), #edf0f4 0);
      box-shadow: inset 0 0 0 .5rem white;
      font-size: .82rem; font-weight: 900;
    }
    .snapshot-item small { color: var(--muted); font-size: .72rem; font-weight: 800; text-align: center; }
    @media (max-width: 420px) {
      .snapshot-ring { width: 3.55rem; }
      .snapshot { gap: .4rem; }
    }
    @media (min-width: 720px) {
      h1 { font-size: 1.58rem; }
      header, main { padding-left: 1.5rem; padding-right: 1.5rem; }
      .metrics { grid-template-columns: repeat(4, minmax(0,1fr)); }
      .two { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .three { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .statgrid { grid-template-columns: repeat(4, minmax(0,1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="brandmark" aria-hidden="true"><span class="brandheart"></span><span class="brandcheck"></span></div>
        <div>
          <p class="eyebrow">Reset Tracker</p>
          <h1>Life dashboard</h1>
        </div>
      </div>
      <div class="date-pill">
        <p id="todayLabel"></p>
        <strong id="dayCount">0 days</strong>
      </div>
    </header>
    <main id="screen"></main>
  </div>
  <nav class="nav"><div class="nav-inner" id="nav"></div></nav>

  <script>
    const keys = {
      entries: "reset-static.entries",
      settings: "reset-static.settings",
      history: "reset-static.history",
      skills: "reset-static.skills"
    };
    const browserTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "America/Chicago";
    const defaultSettings = {
      calorie_goal: 2200,
      protein_goal: 160,
      step_goal: 10000,
      water_goal: 2.5,
      sleep_goal: 7.5,
      caffeine_limit: 400,
      creatine_goal: 5,
      goal_weight: 68,
      time_zone: browserTimeZone
    };
    const tabs = [
      ["today", "Today"], ["chat", "ChatGPT"], ["log", "Log"], ["import", "Import"],
      ["reading", "Reading"], ["skills", "Skills"], ["ledger", "Ledger"], ["insights", "Insights"], ["share", "Share"], ["settings", "Goals"]
    ];
    let settings = { ...defaultSettings, ...read(keys.settings, {}) };
    let entries = read(keys.entries, []).map(ensureEntry).sort((a,b) => b.date.localeCompare(a.date));
    let history = read(keys.history, []);
    let skillRecords = read(keys.skills, []).map(ensureSkillRecord).sort((a,b) => b.date.localeCompare(a.date));
    let active = "today";
    let selectedDate = todayKey();
    let periodDays = 7;

    function read(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; }
    }
    function write(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
    const skillTargets = {
      "Handstand hold": { unit: "sec", target: 60, color: "blue" },
      "Handstand pushups": { unit: "reps", target: 10, color: "coral" },
      "Planche": { unit: "sec", target: 10, color: "violet" },
      "L-sit": { unit: "sec", target: 60, color: "blue" },
      "Front lever": { unit: "sec", target: 15, color: "violet" },
      "Back lever": { unit: "sec", target: 15, color: "violet" },
      "Muscle-up": { unit: "reps", target: 10, color: "coral" },
      "Pull-ups": { unit: "reps", target: 20, color: "coral" }
    };
    const bibleChapterCounts = {
      Genesis: 50, Exodus: 40, Leviticus: 27, Numbers: 36, Deuteronomy: 34, Joshua: 24, Judges: 21, Ruth: 4,
      "1 Samuel": 31, "2 Samuel": 24, "1 Kings": 22, "2 Kings": 25, "1 Chronicles": 29, "2 Chronicles": 36,
      Ezra: 10, Nehemiah: 13, Esther: 10, Job: 42, Psalms: 150, Proverbs: 31, Ecclesiastes: 12, "Song of Solomon": 8,
      Isaiah: 66, Jeremiah: 52, Lamentations: 5, Ezekiel: 48, Daniel: 12, Hosea: 14, Joel: 3, Amos: 9, Obadiah: 1,
      Jonah: 4, Micah: 7, Nahum: 3, Habakkuk: 3, Zephaniah: 3, Haggai: 2, Zechariah: 14, Malachi: 4,
      Matthew: 28, Mark: 16, Luke: 24, John: 21, Acts: 28, Romans: 16, "1 Corinthians": 16, "2 Corinthians": 13,
      Galatians: 6, Ephesians: 6, Philippians: 4, Colossians: 4, "1 Thessalonians": 5, "2 Thessalonians": 3,
      "1 Timothy": 6, "2 Timothy": 4, Titus: 3, Philemon: 1, Hebrews: 13, James: 5, "1 Peter": 5, "2 Peter": 3,
      "1 John": 5, "2 John": 1, "3 John": 1, Jude: 1, Revelation: 22
    };
    const bibleTotalChapters = Object.values(bibleChapterCounts).reduce((a,b) => a + b, 0);
    function appTimeZone() { return settings?.time_zone || browserTimeZone; }
    function todayKey(date = new Date()) {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: appTimeZone(),
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(date);
      const value = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return `${value.year}-${value.month}-${value.day}`;
    }
    function pretty(date) {
      return date ? new Date(date + "T12:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric" }) : "";
    }
    function blank(date = todayKey()) {
      return {
        date,
        weight_kg: null,
        steps: null,
        water_liters: null,
        sleep_hours: null,
        mood_1_10: null,
        energy_1_10: null,
        nutrition: { tracked: false, confidence: "medium", calories: null, protein_g: null, carbs_g: null, fat_g: null, fiber_g: null, caffeine_mg: null, creatine_g: null },
        habits: {
          workout: { completed: false, value: null, unit: "minutes", status: "missing" },
          reading: { completed: false, value: null, unit: "minutes", status: "missing" },
          meditation: { completed: false, value: null, unit: "minutes", status: "missing" },
          water: { completed: false, value: null, unit: "liters", status: "missing" },
          creatine: { completed: false, value: null, unit: "grams", status: "missing" }
        },
        data_quality: { nutrition_tracked: false, sleep_tracked: false, steps_tracked: false, weight_tracked: false, habits_tracked: "none", overall_confidence: "medium" },
        sleep: { score: null, bedtime: "", wake_time: "", notes: "" },
        bible: { sessions: [], total_pages: null, total_chapters: null, books: [] },
        reading_detail: { sessions: [], total_pages: null, total_chapters: null, books: [] },
        workouts: [],
        screen_time: { useful_minutes: null, entertainment_minutes: null, total_minutes: null, notes: "" },
        mood_detail: { stress_1_10: null, focus_1_10: null, motivation_1_10: null, tags: [], notes: "" },
        notes: ""
      };
    }
    function ensureEntry(input) {
      const base = blank(input?.date || todayKey());
      const out = { ...base, ...(input || {}) };
      out.nutrition = { ...base.nutrition, ...(input?.nutrition || {}) };
      out.habits = {
        workout: { ...base.habits.workout, ...(input?.habits?.workout || {}) },
        reading: { ...base.habits.reading, ...(input?.habits?.reading || {}) },
        meditation: { ...base.habits.meditation, ...(input?.habits?.meditation || {}) },
        water: { ...base.habits.water, ...(input?.habits?.water || {}) },
        creatine: { ...base.habits.creatine, ...(input?.habits?.creatine || {}) }
      };
      out.data_quality = { ...base.data_quality, ...(input?.data_quality || {}) };
      out.sleep = { ...base.sleep, ...(input?.sleep || {}) };
      out.bible = normalizeBookBlock(input?.bible || input?.bible_reading || base.bible);
      out.reading_detail = normalizeBookBlock(input?.reading_detail || input?.reading_log || base.reading_detail);
      out.workouts = Array.isArray(input?.workouts) ? input.workouts.map(normalizeWorkout).filter(Boolean) : [];
      if (!out.workouts.length && out.habits.workout.value != null) {
        out.workouts = [{ type: "unspecified", minutes: out.habits.workout.value, intensity: "", notes: "" }];
      }
      out.screen_time = { ...base.screen_time, ...(input?.screen_time || {}) };
      out.mood_detail = { ...base.mood_detail, ...(input?.mood_detail || {}) };
      out.mood_detail.tags = Array.isArray(out.mood_detail.tags) ? out.mood_detail.tags : [];
      delete out.skill_records;
      return out;
    }
    function normalizeBookBlock(value) {
      const sessions = Array.isArray(value?.sessions) ? value.sessions : Array.isArray(value) ? value : [];
      const normalized = sessions.map((s) => ({
        book: s.book || s.book_title || "",
        chapters: normalizeChapters(s.chapters ?? s.chapter),
        pages: num(s.pages),
        minutes: num(s.minutes),
        notes: s.notes || ""
      }));
      const books = [...new Set([...(Array.isArray(value?.books) ? value.books : []), ...normalized.map(s => s.book).filter(Boolean)])];
      return {
        sessions: normalized,
        total_pages: num(value?.total_pages) ?? sum(normalized.map(s => s.pages)),
        total_chapters: num(value?.total_chapters) ?? normalized.reduce((total, s) => total + s.chapters.length, 0),
        books
      };
    }
    function normalizeChapters(value) {
      const pieces = Array.isArray(value) ? value : value == null || value === "" ? [] : `${value}`.split(",");
      const chapters = [];
      pieces.forEach((piece) => {
        if (typeof piece === "number" && Number.isFinite(piece)) chapters.push(piece);
        if (typeof piece === "string") {
          const clean = piece.trim();
          const range = clean.match(/^(\d+)\s*[-–]\s*(\d+)$/);
          if (range) {
            const start = Number(range[1]);
            const end = Number(range[2]);
            for (let i = Math.min(start, end); i <= Math.max(start, end); i++) chapters.push(i);
          } else if (/^\d+$/.test(clean)) chapters.push(Number(clean));
        }
      });
      return [...new Set(chapters)].sort((a,b) => a - b);
    }
    function bibleChapterKey(book, chapter) {
      return book && chapter ? `${book} ${chapter}` : "";
    }
    function bibleCoverage(days = entries) {
      const read = new Set();
      days.forEach((entry) => {
        ensureEntry(entry).bible.sessions.forEach((session) => {
          session.chapters.forEach((chapter) => {
            const key = bibleChapterKey(session.book, chapter);
            if (key) read.add(key);
          });
        });
      });
      const byBook = {};

        document.getElementById("dayCount").textContent = `${entries.length} days`;
      } catch (err) {
        box.innerHTML = `<div class="status warn" style="margin-top:.8rem">${err.message || "Import failed."}</div>`;
      }
    }
    function renderLedger() {
      return `${section("Ledger", "Daily records", `${entries.length} saved day${entries.length === 1 ? "" : "s"}`)}
        <div class="ledger" style="margin-top:1rem">${entries.map(e => {
          const workout = sum(e.workouts.map(w => w.minutes));
          return `<article class="card"><div class="row"><div><h3>${e.date}</h3><p class="section-copy">${e.notes || "No notes"}</p></div><b>${habitScore(e)}%</b></div><div class="statgrid">${stat("Calories", e.nutrition.tracked ? e.nutrition.calories : "untracked")}${stat("Protein", e.nutrition.protein_g)}${stat("Sleep score", e.sleep.score)}${stat("Workout", minutesLabel(workout))}${stat("Bible", `${e.bible.total_chapters || 0} ch`) }${stat("Mood", e.mood_1_10)}${stat("Energy", e.energy_1_10)}${stat("Screen", minutesLabel(e.screen_time.total_minutes))}</div><button class="btn ghost" style="margin-top:.85rem;width:100%" onclick="deleteEntry('${e.date}')">Delete this day</button></article>`;
        }).join("") || `<div class="card">No daily records yet. Add a quick log or paste a ChatGPT import.</div>`}</div>`;
    }
    function bestSkillRecords() {
      const best = {};
      skillRecords.forEach((record) => {
        if (record.value == null) return;
        if (!best[record.skill] || record.value > best[record.skill].value) best[record.skill] = record;
      });
      return best;
    }
    function renderSkillOption(name) {
      return `<option value="${name}">${name}</option>`;
    }
    function renderSkillBestCard(skill, record) {
      const target = skillTargets[skill] || { unit: record?.unit || "sec", target: Math.max(record?.value || 1, 1), color: "blue" };
      const progress = pct(record?.value, target.target);
      const ringClass = target.color === "violet" ? "violet" : target.color === "coral" ? "coral" : "";
      return `<article class="card ring-card">
        <div class="ring ${ringClass}" style="--progress:${progress}%">${progress}%</div>
        <div>
          <h3>${skill}</h3>
          <p class="section-copy">${record ? `${record.value} ${record.unit} on ${record.date}` : "No record yet"}</p>
          <div class="skill-meta"><span>${record?.progression || "progression open"}</span><span>goal ${target.target} ${target.unit}</span></div>
        </div>
      </article>`;
    }
    function renderSkills() {
      const best = bestSkillRecords();
      const featured = Object.keys(skillTargets);
      return `${section("Skills", "Calisthenics progress", "Log PRs whenever you break a record or unlock a new progression. This is separate from daily workout minutes.")}
        <div class="ring-row">${featured.slice(0,4).map(skill => renderSkillBestCard(skill, best[skill])).join("")}</div>
        <article class="card" style="margin-top:1rem">
          <strong>Add skill record</strong>
          <div class="grid two" style="margin-top:.85rem">
            <label class="field"><span>Date</span><input id="skill_date" type="date" value="${todayKey()}"></label>
            <label class="field"><span>Skill</span><select id="skill_name">${featured.map(renderSkillOption).join("")}<option value="Other">Other</option></select></label>
            ${inputField("Value","skill_value",null,"0.1")}
            <label class="field"><span>Unit</span><select id="skill_unit"><option>sec</option><option>reps</option><option>level</option><option>attempts</option></select></label>
            ${inputField("Quality 1-10","skill_quality",null,"1")}
            <label class="field"><span>Progression</span><input id="skill_progression" type="text" placeholder="wall hold, tuck planche, freestanding, etc."></label>
          </div>
          <label class="field" style="margin-top:.75rem"><span>Notes</span><textarea id="skill_notes" placeholder="What changed, form cue, setup, video note, or next focus"></textarea></label>
          <button class="btn dark" style="margin-top:.9rem;width:100%" onclick="saveSkillRecord()">Save skill PR</button><div id="skillStatus"></div>
        </article>
        <div class="skill-list">${skillRecords.map((record, index) => renderSkillRecord(record, index)).join("") || `<article class="card" style="margin-top:1rem">No skill records yet. Add your first PR above.</article>`}</div>`;
    }
    function renderSkillRecord(record, index) {
      const target = skillTargets[record.skill] || { color: "blue" };
      const cardClass = target.color === "violet" ? "violet" : target.color === "coral" ? "coral" : "";
      return `<article class="card skill-card ${cardClass}">
        <div class="row"><div><h3>${record.skill}</h3><p class="section-copy">${record.date}${record.progression ? ` - ${record.progression}` : ""}</p></div><b>${record.value ?? "-"} ${record.unit}</b></div>
        <div class="skill-meta"><span>quality ${record.quality_1_10 ?? "-"}/10</span><span>${record.notes || "No notes"}</span></div>
        <button class="btn ghost" style="margin-top:.85rem;width:100%" onclick="deleteSkillRecord(${index})">Delete record</button>
      </article>`;
    }
    function saveSkillRecord() {
      const chosen = str("skill_name");
      const skill = chosen === "Other" ? (prompt("Skill name?") || "Other") : chosen;
      const record = ensureSkillRecord({
        date: str("skill_date"),
        skill,
        value: val("skill_value"),
        unit: str("skill_unit"),
        progression: str("skill_progression"),
        quality_1_10: val("skill_quality"),
        notes: str("skill_notes")
      });
      if (record.value == null) {
        document.getElementById("skillStatus").innerHTML = `<div class="status warn" style="margin-top:.8rem">Add a value before saving.</div>`;
        return;
      }
      skillRecords = [record, ...skillRecords].sort((a,b) => b.date.localeCompare(a.date));
      write(keys.skills, skillRecords);
      render();
    }
    function deleteSkillRecord(index) {
      const record = skillRecords[index];
      if (!record || !confirm(`Delete ${record.skill} record from ${record.date}?`)) return;
      skillRecords.splice(index, 1);
      write(keys.skills, skillRecords);
      render();
    }
    function renderReading() {
      const now = todayKey();
      const yearPrefix = now.slice(0, 4);
      const monthPrefix = now.slice(0, 7);
      const monthEntries = entries.filter(e => e.date.startsWith(monthPrefix));
      const yearEntries = entries.filter(e => e.date.startsWith(yearPrefix));
      const allBible = bibleCoverage(entries);
      const monthBible = bibleCoverage(monthEntries);
      const yearBible = bibleCoverage(yearEntries);
      const readingAll = bookHistory("reading_detail");
      const readingMonth = readingAll.filter(item => item.date.startsWith(monthPrefix));
      const readingBooks = [...new Set(readingAll.map(item => item.book))];
      const readingMonthBooks = [...new Set(readingMonth.map(item => item.book))];
      const bibleRows = Object.entries(allBible.byBook)
        .sort((a,b) => b[1] - a[1])
        .map(([book, count]) => {
          const total = bibleChapterCounts[book] || count;
          return `<div class="timeline-row"><span>${book}</span><div class="bar violet"><span style="width:${pct(count, total)}%"></span></div><b>${count}/${total}</b></div>`;
        }).join("");
      return `${section("Reading", "Bible and book history", "Track what you read, what chapters you covered, and how your month or year is building.")}
        <div class="grid metrics" style="margin-top:1rem">
          ${metric("Bible total", allBible.read.size, "chapters", bibleTotalChapters, "BIB")}
          ${metric("Bible progress", allBible.percent, "%", 100, "ALL")}
          ${metric("This year", yearBible.percent, "% Bible", 100, "YR")}
          ${metric("Books read", readingBooks.length, "books", null, "RD")}
        </div>
        <article class="card" style="margin-top:.85rem">
          <strong>This month</strong>
          <div class="statgrid">
            ${stat("Bible books", Object.keys(monthBible.byBook).join(", ") || "-")}
            ${stat("Bible chapters", monthBible.read.size)}
            ${stat("Other books", readingMonthBooks.join(", ") || "-")}
            ${stat("Reading pages", sum(readingMonth.map(item => item.pages)))}
          </div>
        </article>
        <article class="card" style="margin-top:.85rem">
          <strong>Bible coverage by book</strong>
          <div class="timeline">${bibleRows || "<p class='section-copy' style='margin-top:.6rem'>No Bible chapters logged yet.</p>"}</div>
          <div class="statgrid">${stat("Completed books", allBible.completeBooks.join(", ") || "-")}${stat("Chapters this year", yearBible.read.size)}${stat("Chapters this month", monthBible.read.size)}${stat("Bible total", `${allBible.read.size}/${bibleTotalChapters}`)}</div>
        </article>
        <article class="card" style="margin-top:.85rem">
          <strong>Full book history</strong>
          <div class="ledger" style="margin-top:.75rem">${readingAll.map(item => `<div class="stat"><div class="row"><b>${item.book}</b><small>${item.date}</small></div><p class="section-copy">${item.pages ? `${item.pages} pages` : ""}${item.chapters.length ? `${item.pages ? " - " : ""}chapters ${item.chapters.join(", ")}` : ""}${item.notes ? ` - ${item.notes}` : ""}</p></div>`).join("") || "<p class='section-copy'>No non-Bible book sessions logged yet.</p>"}</div>
        </article>`;
    }
    function renderSkillHighlights(limit = 4) {
      const best = bestSkillRecords();
      const rows = Object.entries(best)
        .sort((a,b) => (b[1].date || "").localeCompare(a[1].date || ""))
        .slice(0, limit);
      return rows.map(([skill, record]) => stat(skill, `${record.value} ${record.unit} (${record.date})`)).join("") || stat("Skill PRs", "No records yet");
    }
    function setPeriod(days) { periodDays = days; render(); }
    function barRow(label, value, max, color = "") {
      return `<div class="timeline-row"><span>${label}</span><div class="bar ${color}"><span style="width:${max ? Math.min(100, Math.round(value / max * 100)) : 0}%"></span></div><b>${minutesLabel(value)}</b></div>`;
    }
    function renderInsights() {
      const data = aggregate(periodEntries());
      const biblePeriod = bibleCoverage(periodEntries());
      const bibleYear = bibleCoverage(entries.filter(e => e.date.startsWith(todayKey().slice(0, 4))));
      const periodReadingBooks = [...new Set(periodEntries().flatMap(e => e.reading_detail.books))];
      const maxWorkout = Math.max(1, ...Object.values(data.workoutTypes));
      const periodLabel = periodDays === 365 ? "year" : periodDays === 30 ? "month" : "week";
      const workoutEnergy = compareAvg(periodEntries(), e => sum(e.workouts.map(w => w.minutes)) > 0, e => e.energy_1_10);
      const sleepEnergy = compareAvg(periodEntries(), e => (e.sleep.score || 0) >= 80 || (e.sleep_hours || 0) >= settings.sleep_goal, e => e.energy_1_10);
      const screenMood = compareAvg(periodEntries(), e => (e.screen_time.entertainment_minutes || 0) <= 90, e => e.mood_1_10);
      return `${section("Insights", `${periodDays}-day overview`, "A clean read on what you consumed, how you spent time, and how you felt.")}
        <div class="pillrow" style="margin-top:1rem">
          <button class="btn ${periodDays === 7 ? "" : "soft"}" onclick="setPeriod(7)">Week</button>
          <button class="btn ${periodDays === 30 ? "" : "soft"}" onclick="setPeriod(30)">Month</button>
          <button class="btn ${periodDays === 365 ? "" : "soft"}" onclick="setPeriod(365)">Year</button>
        </div>
        <div class="grid metrics" style="margin-top:1rem">
          ${metric("Avg calories", data.avgCalories, "kcal", null, "CAL")}
          ${metric("Avg protein", data.avgProtein, "g", null, "PRO")}
          ${metric("Avg sleep score", data.avgSleepScore, "/100", null, "SLP")}
          ${metric("Avg energy", data.avgEnergy, "/10", null, "EN")}
          ${metric("Workout total", data.workoutMinutes, "min", null, "FIT")}
          ${metric("Bible chapters", data.bibleChapters, "chapters", null, "BIB")}
          ${metric("Useful screen", data.useful, "min", null, "USE")}
          ${metric("Entertainment", data.entertainment, "min", null, "ENT")}
        </div>
        <div class="grid two" style="margin-top:.85rem">
          <article class="card"><strong>Workout split</strong><div class="timeline">${Object.entries(data.workoutTypes).map(([k,v]) => barRow(k, v, maxWorkout, "coral")).join("") || "<p class='section-copy' style='margin-top:.6rem'>No workout data in this period.</p>"}</div></article>
          <article class="card"><strong>Time use</strong><div class="timeline">${barRow("Useful", data.useful, Math.max(data.useful, data.entertainment, 1))}${barRow("Entertainment", data.entertainment, Math.max(data.useful, data.entertainment, 1), "gold")}${barRow("Workout", data.workoutMinutes, Math.max(data.useful, data.entertainment, data.workoutMinutes, 1), "coral")}</div></article>
        </div>
        <article class="card" style="margin-top:.85rem">
          <strong>Bible and reading</strong>
          <div class="statgrid">${stat("Bible books", Object.keys(biblePeriod.byBook).join(", ") || "-")}${stat("Bible chapters", biblePeriod.read.size)}${stat("Bible this year", `${bibleYear.percent}%`)}${stat("Other books", periodReadingBooks.join(", ") || "-")}${stat("Reading pages", data.readingPages)}${stat("Logged days", `${data.loggedDays}/${periodDays}`)}</div>
        </article>
        <article class="card" style="margin-top:.85rem">
          <strong>Calisthenics PRs</strong>
          <div class="statgrid">${renderSkillHighlights()}</div>
        </article>
        <article class="card" style="margin-top:.85rem">
          <strong>Possible patterns</strong>
          <div class="statgrid">${stat("Workout days energy", workoutEnergy)}${stat("Good sleep energy", sleepEnergy)}${stat("Lower entertainment mood", screenMood)}${stat("Note", `These are correlations for this ${periodLabel}, not proof.`)}</div>
        </article>`;
    }
    function compareAvg(days, predicate, selector) {
      const yes = avg(days.filter(predicate).map(selector));
      const no = avg(days.filter(e => !predicate(e)).map(selector));
      if (yes == null || no == null) return "-";
      const diff = Math.round((yes - no) * 10) / 10;
      return `${yes} vs ${no} (${diff >= 0 ? "+" : ""}${diff})`;
    }
    function renderShare() {
      const data = aggregate(periodEntries(7));
      const consistency = Math.round(((data.loggedDays / 7) * .35 + (data.nutritionTracked / 7) * .2 + (data.workouts.length / 7) * .2 + Math.min(1, data.bibleChapters / 7) * .15 + Math.min(1, (data.avgSleepScore || 0) / 85) * .1) * 100);
      return `${section("Share card", "Weekly reset report", "Screenshot-friendly overview with richer life data.")}
        <div class="share-wrap" style="margin-top:1rem"><div class="share">
          <p class="eyebrow gold">Weekly Reset Report</p><h2>${pretty(periodEntries(7).at(-1).date)} - ${pretty(periodEntries(7)[0].date)}</h2>
          <div class="score"><small>Consistency score</small><b>${consistency}%</b></div>
          <div class="share-grid">${shareStat("Days logged", `${data.loggedDays}/7`)}${shareStat("Workouts", data.workouts.length)}${shareStat("Bible", `${data.bibleChapters} ch`)}${shareStat("Avg protein", data.avgProtein == null ? "-" : `${data.avgProtein}g`)}${shareStat("Sleep score", data.avgSleepScore ?? "-")}${shareStat("Useful screen", minutesLabel(data.useful))}</div>
          <div class="share-bottom"><div><small class="gold">Weekly Win</small><p>${data.bibleChapters || data.workoutMinutes ? "You kept investing in the inputs." : "You kept the signal alive."}</p></div><div><small class="gold">Focus Next Week</small><p>${data.entertainment > data.useful ? "Tilt screen time toward useful blocks." : "Protect sleep and repeat the basics."}</p></div><div class="footer">Progress over perfection.</div></div>
        </div></div>`;
    }
    function shareStat(label, value) { return `<div class="share-stat"><small>${label}</small><b>${value}</b></div>`; }
    function renderSettings() {
      const fields = [["calorie_goal","Calorie goal","1"],["protein_goal","Protein goal","1"],["step_goal","Step goal","1"],["water_goal","Water goal","0.1"],["sleep_goal","Sleep goal","0.1"],["caffeine_limit","Caffeine limit","1"],["creatine_goal","Creatine goal","0.1"],["goal_weight","Goal weight","0.1"]];
      return `${section("Goals", "Personal targets and data", "Stored locally in this browser. Back up before clearing cache or reinstalling.")}
        <div class="grid two" style="margin-top:1rem">${fields.map(([id,label,step]) => inputField(label, id, settings[id], step)).join("")}<label class="field"><span>Timezone</span><input id="time_zone" value="${settings.time_zone || browserTimeZone}"></label></div>
        <button class="btn" style="margin-top:.9rem;width:100%" onclick="saveGoals()">Save goals</button><div id="goalStatus"></div>
        <article class="card" style="margin-top:1.1rem">
          <strong>Data backup</strong><p class="section-copy" style="margin-top:.35rem">Use this before clearing Safari data, reinstalling the Home Screen app, or testing a new link.</p>
          <div class="grid two" style="margin-top:.9rem"><button class="btn dark" onclick="copyBackup()">Copy backup JSON</button><button class="btn" onclick="downloadBackup()">Download backup</button></div>
          <label class="field" style="margin-top:.9rem"><span>Restore backup JSON</span><textarea id="backupJson" class="backupbox" placeholder="Paste a backup JSON here"></textarea></label>
          <button class="btn dark" style="margin-top:.75rem;width:100%" onclick="restoreBackup()">Restore backup</button>
          <button class="btn ghost" style="margin-top:.75rem;width:100%" onclick="clearAllData()">Clear all local data</button>
          <div id="backupStatus"></div>
        </article>`;
    }
    function saveGoals() {
      const next = {};
      Object.keys(defaultSettings).forEach(k => next[k] = k === "time_zone" ? str(k) : Number(document.getElementById(k)?.value));
      settings = { ...defaultSettings, ...next };
      write(keys.settings, settings);
      document.getElementById("goalStatus").innerHTML = `<div class="status success" style="margin-top:.8rem">Goals saved.</div>`;
    }
    async function copyBackup() {
      const status = document.getElementById("backupStatus");
      try {
        await navigator.clipboard.writeText(backupText());
        status.innerHTML = `<div class="status success" style="margin-top:.8rem">Backup copied. Save it somewhere safe.</div>`;
      } catch {
        const box = document.getElementById("backupJson");
        box.value = backupText();
        box.select();
        status.innerHTML = `<div class="status warn" style="margin-top:.8rem">Clipboard copy failed. The backup is in the restore box so you can copy it manually.</div>`;
      }
    }
    function downloadBackup() {
      const blob = new Blob([backupText()], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `reset-health-backup-${todayKey()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      document.getElementById("backupStatus").innerHTML = `<div class="status success" style="margin-top:.8rem">Backup download started.</div>`;
    }
    function restoreBackup() {
      const status = document.getElementById("backupStatus");
      try {
        const data = JSON.parse(document.getElementById("backupJson").value.trim());
        if (!data || data.app !== "reset-health-tracker" || !Array.isArray(data.entries)) throw new Error("This does not look like a Reset backup.");
        entries = data.entries.map(ensureEntry).sort((a,b) => b.date.localeCompare(a.date));
        settings = { ...defaultSettings, ...(data.settings || {}) };
        history = Array.isArray(data.history) ? data.history : [];
        skillRecords = Array.isArray(data.skillRecords) ? data.skillRecords.map(ensureSkillRecord).sort((a,b) => b.date.localeCompare(a.date)) : [];
        write(keys.entries, entries); write(keys.settings, settings); write(keys.history, history); write(keys.skills, skillRecords);
        status.innerHTML = `<div class="status success" style="margin-top:.8rem">Backup restored. ${entries.length} days and ${skillRecords.length} skill records loaded.</div>`;
        setTimeout(render, 600);
      } catch (err) {
        status.innerHTML = `<div class="status warn" style="margin-top:.8rem">${err.message || "Could not restore that backup."}</div>`;
      }
    }
    function clearAllData() {
      if (prompt("Type DELETE to clear all tracker data stored on this device.") !== "DELETE") return;
      entries = []; settings = { ...defaultSettings }; history = []; skillRecords = [];
      localStorage.removeItem(keys.entries); localStorage.removeItem(keys.settings); localStorage.removeItem(keys.history); localStorage.removeItem(keys.skills);
      render();
    }
    function renderNav() {
      document.getElementById("nav").innerHTML = tabs.map(([id, label]) => `<button class="${active === id ? "active" : ""}" onclick="active='${id}';render()">${label}</button>`).join("");
    }
    function render() {
      document.getElementById("todayLabel").textContent = pretty(todayKey());
      document.getElementById("dayCount").textContent = `${entries.length} days`;
      renderNav();
      const map = { today: renderToday, chat: renderChat, log: renderLog, import: renderImport, reading: renderReading, skills: renderSkills, ledger: renderLedger, insights: renderInsights, share: renderShare, settings: renderSettings };
      document.getElementById("screen").innerHTML = map[active]();
    }
    render();
    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
